<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Clock & Weather</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f0e;
    --surface: #141714;
    --surface2: #1a1d1a;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8ebe6;
    --text2: #8a9088;
    --text3: #5a5e58;
    --green: #4caf7d;
    --amber: #d4a843;
    --blue: #5b9cf6;
    --orange: #e08a4e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.4;
  }

  .header {
    padding: 2rem 2.5rem 1.5rem;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 1;
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.4rem;
    font-weight: 400;
    letter-spacing: -0.01em;
    line-height: 1;
  }

  h1 em {
    font-style: italic;
    color: var(--text2);
  }

  .sub {
    color: var(--text2);
    font-size: 0.9rem;
    margin-top: 0.75rem;
    max-width: 640px;
  }

  main {
    padding: 2.5rem;
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.25rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s ease, transform 0.2s ease;
  }

  .card:hover {
    border-color: var(--border2);
    transform: translateY(-2px);
  }

  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.5rem;
  }

  .city {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    line-height: 1.1;
  }

  .country {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  .offset {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text2);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 0.25rem 0.5rem;
    border-radius: 6px;
    white-space: nowrap;
  }

  .time {
    font-family: 'DM Mono', monospace;
    font-size: 2.6rem;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--text);
  }

  .time .sec {
    color: var(--text3);
    font-size: 1.4rem;
    margin-left: 0.25rem;
  }

  .date {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    color: var(--text2);
    margin-top: 0.5rem;
  }

  .weather {
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .weather-main {
    display: flex;
    align-items: center;
    gap: 0.85rem;
  }

  .icon {
    font-size: 2rem;
    line-height: 1;
  }

  .temp {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    line-height: 1;
  }

  .conditions {
    font-size: 0.75rem;
    color: var(--text2);
    margin-top: 0.25rem;
    text-transform: capitalize;
  }

  .meta {
    text-align: right;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--text2);
    line-height: 1.6;
  }

  .meta span { color: var(--text3); }

  .day-night {
    position: absolute;
    top: 0; right: 0;
    width: 8px; height: 100%;
    background: var(--surface2);
  }

  .day-night.day { background: linear-gradient(180deg, var(--amber), var(--orange)); }
  .day-night.night { background: linear-gradient(180deg, #2a3550, #0f1422); }

  .loading {
    color: var(--text3);
    font-style: italic;
    font-size: 0.8rem;
  }

  .controls {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }

  .btn {
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 0.55rem 1rem;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.2s ease;
  }

  .btn:hover { background: var(--surface2); }

  .add-form {
    display: none;
    margin-top: 1rem;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .add-form.open { display: flex; }

  .add-form input {
    background: var(--surface);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 0.55rem 0.75rem;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    min-width: 180px;
  }

  .add-form input:focus { outline: 1px solid var(--blue); }

  .footer {
    padding: 2rem 2.5rem;
    border-top: 1px solid var(--border);
    margin-top: 3rem;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  .footer a { color: var(--text2); text-decoration: none; }
  .footer a:hover { color: var(--text); }

  .remove {
    position: absolute;
    top: 0.75rem; right: 1.5rem;
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 1.1rem;
    line-height: 1;
    padding: 0.25rem;
    opacity: 0;
    transition: opacity 0.2s ease, color 0.2s ease;
  }

  .card:hover .remove { opacity: 1; }
  .remove:hover { color: var(--text); }

  @media (max-width: 600px) {
    .header { padding: 1.5rem; }
    main { padding: 1.5rem; }
    h1 { font-size: 1.8rem; }
    .time { font-size: 2.2rem; }
  }
</style>
</head>
<body>
<div class="noise"></div>

<header class="header">
  <div class="eyebrow">// proof of concept</div>
  <h1>World <em>Clock</em> & Weather</h1>
  <p class="sub">Live local time and current conditions for cities around the world. Times update every second; weather refreshes every 10 minutes.</p>
  <div class="controls">
    <button class="btn" id="toggleAdd">+ Add City</button>
    <button class="btn" id="resetCities">Reset</button>
  </div>
  <div class="add-form" id="addForm">
    <input type="text" id="cityName" placeholder="City name (e.g. Reykjavík)">
    <input type="text" id="countryCode" placeholder="Country (e.g. IS)">
    <button class="btn" id="addCity">Add</button>
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<footer class="footer">
  Weather via <a href="https://open-meteo.com" target="_blank" rel="noopener">open-meteo.com</a> · Geocoding via Open-Meteo · No API key, no tracking
</footer>

<script>
const DEFAULT_CITIES = [
  { name: 'New York',   country: 'US', tz: 'America/New_York',     lat: 40.7128,  lon: -74.0060 },
  { name: 'London',     country: 'GB', tz: 'Europe/London',        lat: 51.5074,  lon: -0.1278  },
  { name: 'Paris',      country: 'FR', tz: 'Europe/Paris',         lat: 48.8566,  lon: 2.3522   },
  { name: 'Dubai',      country: 'AE', tz: 'Asia/Dubai',           lat: 25.2048,  lon: 55.2708  },
  { name: 'Tokyo',      country: 'JP', tz: 'Asia/Tokyo',           lat: 35.6762,  lon: 139.6503 },
  { name: 'Sydney',     country: 'AU', tz: 'Australia/Sydney',     lat: -33.8688, lon: 151.2093 },
  { name: 'San Francisco', country: 'US', tz: 'America/Los_Angeles', lat: 37.7749, lon: -122.4194 },
  { name: 'São Paulo',  country: 'BR', tz: 'America/Sao_Paulo',    lat: -23.5505, lon: -46.6333 },
];

const STORAGE_KEY = 'world-clock-cities';
const WEATHER_REFRESH_MS = 10 * 60 * 1000;

// WMO weather code → { icon, label }
const WMO = {
  0:  ['☀️', 'clear sky'],
  1:  ['🌤️', 'mainly clear'],
  2:  ['⛅', 'partly cloudy'],
  3:  ['☁️', 'overcast'],
  45: ['🌫️', 'fog'],
  48: ['🌫️', 'rime fog'],
  51: ['🌦️', 'light drizzle'],
  53: ['🌦️', 'drizzle'],
  55: ['🌦️', 'dense drizzle'],
  56: ['🌧️', 'freezing drizzle'],
  57: ['🌧️', 'freezing drizzle'],
  61: ['🌧️', 'light rain'],
  63: ['🌧️', 'rain'],
  65: ['🌧️', 'heavy rain'],
  66: ['🌧️', 'freezing rain'],
  67: ['🌧️', 'freezing rain'],
  71: ['🌨️', 'light snow'],
  73: ['🌨️', 'snow'],
  75: ['❄️', 'heavy snow'],
  77: ['🌨️', 'snow grains'],
  80: ['🌦️', 'rain showers'],
  81: ['🌧️', 'rain showers'],
  82: ['⛈️', 'violent showers'],
  85: ['🌨️', 'snow showers'],
  86: ['🌨️', 'snow showers'],
  95: ['⛈️', 'thunderstorm'],
  96: ['⛈️', 'thunderstorm w/ hail'],
  99: ['⛈️', 'severe thunderstorm'],
};

let cities = loadCities();

function loadCities() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) return JSON.parse(stored);
  } catch (e) {}
  return [...DEFAULT_CITIES];
}

function saveCities() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(cities)); } catch (e) {}
}

function cityId(c) { return `${c.name}-${c.lat}-${c.lon}`.replace(/[^a-z0-9-]/gi, '_'); }

function render() {
  const grid = document.getElementById('grid');
  grid.innerHTML = cities.map((c, idx) => {
    const id = cityId(c);
    return `
      <div class="card" data-id="${id}">
        <button class="remove" data-idx="${idx}" title="Remove">×</button>
        <div class="day-night" id="dn-${id}"></div>
        <div class="card-head">
          <div>
            <div class="city">${escapeHtml(c.name)}</div>
            <div class="country">${escapeHtml(c.country || '')}</div>
          </div>
          <div class="offset" id="off-${id}">—</div>
        </div>
        <div class="time" id="t-${id}">--:--<span class="sec">--</span></div>
        <div class="date" id="d-${id}">—</div>
        <div class="weather" id="w-${id}">
          <div class="weather-main">
            <span class="icon">⋯</span>
            <div>
              <div class="temp loading">loading…</div>
              <div class="conditions"></div>
            </div>
          </div>
          <div class="meta"></div>
        </div>
      </div>
    `;
  }).join('');

  document.querySelectorAll('.remove').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = parseInt(e.target.dataset.idx);
      cities.splice(idx, 1);
      saveCities();
      render();
      updateClocks();
      refreshAllWeather();
    });
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[m]));
}

function updateClocks() {
  const now = new Date();
  cities.forEach(c => {
    const id = cityId(c);
    const tEl = document.getElementById(`t-${id}`);
    const dEl = document.getElementById(`d-${id}`);
    const offEl = document.getElementById(`off-${id}`);
    const dnEl = document.getElementById(`dn-${id}`);
    if (!tEl) return;

    const parts = new Intl.DateTimeFormat('en-GB', {
      timeZone: c.tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
    }).formatToParts(now);
    const get = t => parts.find(p => p.type === t)?.value || '--';
    tEl.innerHTML = `${get('hour')}:${get('minute')}<span class="sec">:${get('second')}</span>`;

    const dateStr = new Intl.DateTimeFormat('en-US', {
      timeZone: c.tz, weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
    }).format(now);
    dEl.textContent = dateStr;

    // Compute UTC offset for this tz
    const tzShort = new Intl.DateTimeFormat('en-US', {
      timeZone: c.tz, timeZoneName: 'shortOffset'
    }).formatToParts(now).find(p => p.type === 'timeZoneName')?.value || '';
    offEl.textContent = tzShort.replace('GMT', 'UTC');

    // Day/night strip based on local hour
    const hour = parseInt(get('hour'));
    if (hour >= 6 && hour < 19) {
      dnEl.className = 'day-night day';
    } else {
      dnEl.className = 'day-night night';
    }
  });
}

async function fetchWeather(c) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}` +
              `&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code` +
              `&temperature_unit=celsius&wind_speed_unit=kmh&timezone=auto`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('weather fetch failed');
    const data = await res.json();
    return data.current;
  } catch (e) {
    console.error('Weather error for', c.name, e);
    return null;
  }
}

async function refreshAllWeather() {
  await Promise.all(cities.map(async c => {
    const id = cityId(c);
    const wEl = document.getElementById(`w-${id}`);
    if (!wEl) return;
    const cur = await fetchWeather(c);
    if (!cur) {
      wEl.innerHTML = `<div class="weather-main"><span class="icon">⚠️</span><div><div class="temp" style="font-size:1rem">unavailable</div></div></div>`;
      return;
    }
    const [icon, label] = WMO[cur.weather_code] || ['❔', 'unknown'];
    const tempC = Math.round(cur.temperature_2m);
    const tempF = Math.round(tempC * 9/5 + 32);
    wEl.innerHTML = `
      <div class="weather-main">
        <span class="icon">${icon}</span>
        <div>
          <div class="temp">${tempC}°<span style="font-size:0.9rem;color:var(--text3)">C</span></div>
          <div class="conditions">${label}</div>
        </div>
      </div>
      <div class="meta">
        <div>${tempF}°F</div>
        <div><span>RH</span> ${Math.round(cur.relative_humidity_2m)}%</div>
        <div><span>WIND</span> ${Math.round(cur.wind_speed_10m)} km/h</div>
      </div>
    `;
  }));
}

async function geocode(name, country) {
  const q = encodeURIComponent(name);
  const url = `https://geocoding-api.open-meteo.com/v1/search?name=${q}&count=5&language=en&format=json`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('geocoding failed');
  const data = await res.json();
  if (!data.results || !data.results.length) return null;
  let match = data.results[0];
  if (country) {
    const cc = country.toUpperCase();
    const better = data.results.find(r => (r.country_code || '').toUpperCase() === cc);
    if (better) match = better;
  }
  return {
    name: match.name,
    country: match.country_code || '',
    tz: match.timezone,
    lat: match.latitude,
    lon: match.longitude,
  };
}

document.getElementById('toggleAdd').addEventListener('click', () => {
  document.getElementById('addForm').classList.toggle('open');
});

document.getElementById('addCity').addEventListener('click', async () => {
  const name = document.getElementById('cityName').value.trim();
  const country = document.getElementById('countryCode').value.trim();
  if (!name) return;
  try {
    const found = await geocode(name, country);
    if (!found) { alert(`Couldn't find "${name}"`); return; }
    cities.push(found);
    saveCities();
    document.getElementById('cityName').value = '';
    document.getElementById('countryCode').value = '';
    document.getElementById('addForm').classList.remove('open');
    render();
    updateClocks();
    refreshAllWeather();
  } catch (e) {
    alert('Geocoding failed. Check your connection and try again.');
  }
});

document.getElementById('resetCities').addEventListener('click', () => {
  if (!confirm('Reset to default cities?')) return;
  cities = [...DEFAULT_CITIES];
  saveCities();
  render();
  updateClocks();
  refreshAllWeather();
});

// boot
render();
updateClocks();
refreshAllWeather();
setInterval(updateClocks, 1000);
setInterval(refreshAllWeather, WEATHER_REFRESH_MS);
</script>
</body>
</html>
